<div class="app-shell">
  <header class="app-header">
    <div class="app-header__inner">
      <h1 class="app-header__brand">
        <span class="app-header__brand-mark" aria-hidden="true">◆</span>
        {{ title() }}
      </h1>

      <nav
        class="app-tabs"
        role="tablist"
        aria-label="Sezioni Giphy"
      >
        <button
          #tabBtn
          type="button"
          role="tab"
          id="tab-list"
          class="app-tabs__tab"
          [class.is-active]="isList()"
          [attr.aria-selected]="isList()"
          [attr.tabindex]="isList() ? 0 : -1"
          aria-controls="panel-list"
          (click)="selectTab('list')"
          (keydown)="onTabKeydown($event, 0)"
        >
          Lista GIFs
        </button>

        <button
          #tabBtn
          type="button"
          role="tab"
          id="tab-favorites"
          class="app-tabs__tab"
          [class.is-active]="!isList()"
          [attr.aria-selected]="!isList()"
          [attr.tabindex]="!isList() ? 0 : -1"
          aria-controls="panel-favorites"
          (click)="selectTab('favorites')"
          (keydown)="onTabKeydown($event, 1)"
        >
          Preferiti
        </button>
      </nav>
    </div>
  </header>

  <main class="app-main">
    @if (isList()) {
      <section
        id="panel-list"
        role="tabpanel"
        aria-labelledby="tab-list"
        tabindex="0"
      >
        <app-gifs-list-page />
      </section>
    } @else {
      <section
        id="panel-favorites"
        role="tabpanel"
        aria-labelledby="tab-favorites"
        tabindex="0"
      >
        <app-favorites-page />
      </section>
    }
  </main>
</div>
